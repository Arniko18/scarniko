project_id = "fklsetwqfdmangromprj"

[auth]
site_url = "https://scarniko.vercel.app"
additional_redirect_urls = ["https://scarniko.vercel.app", "https://scarniko.vercel.app/**"]
enable_signup = false
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_manual_linking = false
enable_anonymous_sign_ins = false
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1s"

[auth.sms]
enable_signup = false
enable_confirmations = false
max_frequency = "5s"

[auth.mfa.totp]
enroll_enabled = false
verify_enabled = false

[auth.mfa.web_authn]
enroll_enabled = false
verify_enabled = false
